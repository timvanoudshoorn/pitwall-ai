name: Build iOS IPA (unsigned)

# Produces an UNSIGNED .ipa, deliberately skipping Apple code signing entirely.
# This project only has a free Apple ID (no paid Developer Program membership),
# and free-tier signing can't be reliably automated in headless CI — it needs an
# interactive 2FA login. Instead: build unsigned here, then sign+install locally
# using a tool that does on-device resigning with a free Apple ID, e.g.:
#   - Sideloadly (Windows/Mac desktop app, github.com/itsnebulalol/Sideloadly or
#     sideloadly.io) — drag in the .ipa, enter your Apple ID, connects over USB.
#   - AltStore (altstore.io) — similar, via a background AltServer app.
# Either way the resulting app still expires after Apple's free-tier 7-day limit
# and must be re-signed/reinstalled weekly; that's an Apple platform restriction,
# not something this workflow can change.
#
# No GitHub secrets are required for this workflow.

on:
  workflow_dispatch:

jobs:
  build-unsigned-ipa:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Extract version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor iOS project
        run: npx cap sync ios

      - name: Build unsigned .app
        run: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath "$RUNNER_TEMP/build" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean build

      - name: Package unsigned .ipa
        run: |
          PRODUCTS_DIR="$RUNNER_TEMP/build/Build/Products/Release-iphoneos"
          PAYLOAD_DIR="$RUNNER_TEMP/Payload"
          mkdir -p "$PAYLOAD_DIR"
          cp -r "$PRODUCTS_DIR/App.app" "$PAYLOAD_DIR/"
          cd "$RUNNER_TEMP"
          zip -r "PitWallAI-unsigned.ipa" Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: PitWallAI-${{ steps.version.outputs.version }}-unsigned
          path: ${{ runner.temp }}/PitWallAI-unsigned.ipa
